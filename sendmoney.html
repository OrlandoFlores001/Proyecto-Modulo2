<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero | Proyecto Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <header class="d-flex justify-content-between align-items-center" style="padding: 20px 40px;">
        <a href="menu.html" class="btn btn-astro-action">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        
        <h1 class="fs-3 text-white fw-bold m-0 text-uppercase" style="letter-spacing: 1px;">Astro-Wallet</h1>
        
        <div style="width: 48px;"></div>
    </header>

    <main id="sendmoney">
        <section class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-5">
                    
                    <div class="card shadow-lg p-4" style="border-radius: 16px;">
                        <div class="card-body">
                            
                            <div class="text-center mb-4">
                                <div class="astro-icon-wrapper mb-2">
                                    <i class="ri-send-plane-2-line ri-3x"></i>
                                </div>
                                <h2 class="text-white fw-bold fs-3">Enviar Dinero</h2>
                                <p class="text-light opacity-75 small">Transfiere fondos de forma inmediata a otro usuario</p>
                            </div>

                            <div id="mensaje-error"></div>

                            <form id="form-enviar">
                                <div class="mb-3">
                                    <label for="destinatario" class="form-label mb-2">Usuario Destinatario</label>
                                    <input 
                                        type="text" 
                                        id="destinatario" 
                                        class="form-control" 
                                        placeholder="Ej: nicolas_astro" 
                                        required
                                    >
                                </div>

                                <div class="mb-4">
                                    <label for="monto" class="form-label mb-2">Monto a Transferir ($)</label>
                                    <input 
                                        type="number" 
                                        id="monto" 
                                        class="form-control" 
                                        placeholder="Ej: 10000" 
                                        min="1" 
                                        required
                                    >
                                </div>

                                <button type="submit" class="btn btn-astro-login w-100 m-0 py-3 fs-6">
                                    Confirmar Transferencia
                                </button>
                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Astro-Wallet</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const usuarioLogueado = localStorage.getItem("usuarioLogueado");
        if(!usuarioLogueado){
            window.location.href = "login.html";
        }

        document.getElementById("form-enviar").addEventListener("submit", function(e) {
            e.preventDefault();

            const destinatario = document.getElementById("destinatario").value.trim();
            const montoEnviar = Number(document.getElementById("monto").value);
            const mensajeErrorDiv = document.getElementById("mensaje-error");

            mensajeErrorDiv.innerHTML = "";

            let saldoActual = Number(localStorage.getItem("saldo")) || 0;

            if (montoEnviar > saldoActual) {
                mensajeErrorDiv.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="ri-error-warning-line me-2"></i> Saldo insuficiente. Tu saldo actual es de $${saldoActual.toLocaleString("es-CL")}.
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                `;
                return;
            }

            saldoActual -= montoEnviar;
            localStorage.setItem("saldo", saldoActual);

            alert(`¡Transferencia realizada con éxito!\nHas enviado $${montoEnviar.toLocaleString("es-CL")} al usuario "${destinatario}".`);
            window.location.href = "menu.html";
        });
    </script>
    <script src="assets/js/script.js"></script>
</body>
</html>
