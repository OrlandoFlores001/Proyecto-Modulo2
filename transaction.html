<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Transacciones | Proyecto Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet" />

    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

    <header class="d-flex justify-content-between align-items-center" style="padding: 20px 40px;">
        <a href="menu.html" class="btn btn-astro-action">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <h1 class="fs-3 text-white fw-bold m-0 text-uppercase" style="letter-spacing: 1px;">Astro-Wallet</h1>

        <div style="width: 48px;"></div>
    </header>

    <main id="transaction">
        <section class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-9">

                    <div class="card shadow-lg p-4" style="border-radius: 16px;">
                        <div class="card-body">

                            <div class="text-center mb-4">
                                <div class="astro-icon-wrapper mb-2">
                                    <i class="ri-history-line ri-3x"></i>
                                </div>
                                <h2 class="text-white fw-bold fs-3">Historial de Movimientos</h2>
                                <p class="text-light opacity-75 small">Consulta el registro detallado de tus ingresos y
                                    envíos</p>
                            </div>

                            <div class="table-responsive mt-4">
                                <table class="table table-dark table-hover align-middle m-0"
                                    style="background: transparent;">
                                    <thead>
                                        <tr class="border-bottom border-secondary">
                                            <th scope="col" class="text-light opacity-50 py-3">Tipo</th>
                                            <th scope="col" class="text-light opacity-50 py-3">Detalle / Usuario</th>
                                            <th scope="col" class="text-light opacity-50 py-3 text-end">Monto</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tabla-movimientos">
                                        <tr class="border-bottom border-secondary-subtle">
                                            <td>
                                                <span
                                                    class="badge bg-success-subtle text-success border border-success-subtle px-3 py-2">
                                                    <i class="ri-arrow-down-circle-line me-1"></i> Depósito
                                                </span>
                                            </td>
                                            <td class="text-white">Carga inicial de cuenta</td>
                                            <td class="text-success fw-bold text-end">+$10.000</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Astro-Wallet</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        const usuarioLogueado = localStorage.getItem("usuarioLogueado");
        if (!usuarioLogueado) {
            window.location.href = "login.html";
        }

        const saldoActual = Number(localStorage.getItem("saldo")) || 0;
        console.log("Saldo registrado para tracking visual:", saldoActual);
    </script>
    <script src="assets/js/script.js"></script>
</body>

</html>
