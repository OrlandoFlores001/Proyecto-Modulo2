<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Proyecto Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <header class="d-flex justify-content-between align-items-center" style="padding: 20px 40px;">
        <a href="index.html" class="btn btn-astro-action">
            <i class="fa-solid fa-arrow-left"></i>
        </a>
        
        <h1 class="margin: 0;" class="fs-3">Astro-Wallet</h1>
        
        <button class="btn btn-astro-logout" id="logout">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>

    <main id="menu">
        <section class="container">
            <div class="row justify-content-center mb-5">
                <div class="col-12 col-lg-9">
                    <div class="card shadow-sm" style="border-radius: 16px;">
                        <div class="card-body text-center p-4">
                            <h2>Saldo disponible</h2>
                            <span class="saldo d-block my-2"></span>
                            <p class="text-white-50 m-0">Tu saldo actual</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row row-gap-4 justify-content-center">
                
                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <div class="card h-100 p-3" style="border-radius: 16px;">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div class="astro-icon-wrapper mb-3">
                                <i class="fa-solid fa-wallet fa-3x"></i>
                            </div>
                            <h3>Depositar</h3>
                            <p class="text-white-50 small">Agregar dinero a tu billetera virtual.</p>
                            <a href="desposit.html" class="btn btn-astro-login btn-sm w-100 mt-2">Depositar</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <div class="card h-100 p-3" style="border-radius: 16px;">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div class="astro-icon-wrapper mb-3">
                                <i class="fa-solid fa-paper-plane fa-3x"></i>
                            </div>
                            <h3>Enviar</h3>
                            <p class="text-white-50 small">Realiza transferencias a otros usuarios.</p>
                            <a href="desposit.html" class="btn btn-astro-login btn-sm w-100 mt-2">Enviar</a>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-4 col-lg-3 text-center">
                    <div class="card h-100 p-3" style="border-radius: 16px;">
                        <div class="card-body d-flex flex-column justify-content-between">
                            <div class="astro-icon-wrapper mb-3">
                                <i class="fa-solid fa-clock-rotate-left fa-3x"></i>
                            </div>
                            <h3>Transacciones</h3>
                            <p class="text-white-50 small">Consulta el historial de tus movimientos.</p>
                            <a href="desposit.html" class="btn btn-astro-login btn-sm w-100 mt-2">Ver historial</a>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Astro-Wallet</p>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        // Obtener saldo
        const saldo = Number(localStorage.getItem("saldo")) || 0;
        document.querySelector(".saldo").textContent = "$" + saldo.toLocaleString("es-CL");

        // Proteger página
        const usuarioLogueado = localStorage.getItem("usuarioLogueado");
        if(!usuarioLogueado){
            window.location.href = "login.html";
        }
    </script>
    <script src="assets/js/script.js"></script>
</body>
</html>
