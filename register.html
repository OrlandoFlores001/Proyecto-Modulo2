<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Proyecto Wallet</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header style="display: flex; align-items: center; gap: 12px; padding: 16px;">
        <img src="assets/img/Astro Logo.png" alt="Logo" width="50">
        <h1 style="margin: 0;">Astro-Wallet</h1>
    </header>
    <main>
        <div class="container py-4">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-7 col-lg-5">

                    <div class="card p-4 shadow-lg border-0" style="border-radius: 16px;">
                        <div id="mensaje"></div>
                        <h2 class="text-center mb-4 fs-3">Registro de usuario</h2>

                        <form id="form-registro">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <input type="text" name="nombre" class="form-control" id="nombre"
                                    placeholder="Nombres y Apellidos" required>
                            </div>
                            <div class="mb-3">
                                <label for="usuario" class="form-label">Usuario</label>
                                <input type="text" name="usuario" class="form-control" id="usuario"
                                    placeholder="Ingrese su usuario" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña (mínimo 6 dígitos)</label>
                                <input type="password" name="password" class="form-control" id="password"
                                    placeholder="Ingrese contraseña" minlength="6" required>
                            </div>
                            <div class="mb-4">
                                <label for="confirmar_password" class="form-label">Confirmar contraseña</label>
                                <input type="password" name="confirmar_password" class="form-control"
                                    id="confirmar_password" placeholder="Reingrese contraseña" required>
                            </div>

                            <button type="submit" class="btn btn-astro-login w-100 m-0">Registrarse</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="m-0 small">¿Ya tienes cuenta? <a href="login.html"
                                    class="text-info text-decoration-none">Iniciar Sesión</a></p>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Astro-Wallet</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        document.getElementById("form-registro").addEventListener("submit", function (event) {
            event.preventDefault();

            const nombre = document.getElementById("nombre").value;
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;
            const confirmarPassword = document.getElementById("confirmar_password").value;

            if (password !== confirmarPassword) {
                document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-danger alert-dismissible fade show">
                    Las contraseñas no coinciden.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                `;
                return;
            }

            const nuevoUsuario = {
                nombre,
                usuario,
                password
            }

            let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
            usuarios.push(nuevoUsuario);
            localStorage.setItem("usuarios", JSON.stringify(usuarios));

            document.getElementById("mensaje").innerHTML = `
                <div class="alert alert-success alert-dismissible fade show">
                    Registro exitoso. Redirigiendo...
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                `;

            setTimeout(() => {
                window.location.href = "login.html";
            }, 3000);
        });
    </script>
</body>

</html>
